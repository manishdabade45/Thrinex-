<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="./assets/leaf-solid-full.svg" type="image/x-icon">
    <title>Order Success - R.N. Agritech Services</title>
    <link rel="stylesheet" href="style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
</head>

<body class="success-page">
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="nav-brand">
                <i class="fas fa-leaf"></i>
                <span>R.N. Agritech Services</span>
            </a>
        </div>
    </nav>

    <div class="container">
        <div class="success-card">
            <div class="success-icon">
                <i class="fas fa-check-circle"></i>
            </div>
            <h2>Order Placed Successfully!</h2>
            <p>Your order has been confirmed and is being processed.</p>
            <div class="order-details-box"
                style="margin: 30px 0; padding: 20px; background: #f9f9f9; text-align: left; border-radius: 4px;">
                <p><strong>Order ID:</strong> <span id="successOrderId"></span></p>
                <p><strong>Total Amount:</strong> <span id="successTotal"></span></p>
                <p><strong>Estimated Delivery:</strong> Within 3-5 Business Days</p>
            </div>
            <p style="margin-bottom: 30px;">A summary has been sent to your WhatsApp.</p>
            <div class="success-actions">
                <a href="index.html" class="btn btn-primary" style="margin-right: 15px;">Go to Homepage</a>
                <a href="orders.html" class="btn btn-secondary">View Orders</a>
            </div>        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const lastOrder = JSON.parse(localStorage.getItem('rn_last_order'));
            if (lastOrder) {
                document.getElementById('successOrderId').textContent = lastOrder.orderId;
                document.getElementById('successTotal').textContent = '₹' + lastOrder.total;
            } else {
                window.location.href = 'index.html';
            }
        });
    </script>
</body>

</html>
